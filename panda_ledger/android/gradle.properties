org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
android.enableR8.fullMode=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# 网络超时设置，防止下载依赖时卡住
systemProp.org.gradle.internal.http.connectionTimeout=30000
systemProp.org.gradle.internal.http.socketTimeout=120000
systemProp.org.gradle.internal.repository.max.retries=3
systemProp.org.gradle.internal.repository.initial.backoff=500
# 代理配置（指向本地 7890 端口）
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=7890
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=7890
systemProp.http.nonProxyHosts=localhost|127.0.0.1|*.local
# Kotlin 守护进程 JVM 参数
kotlin.daemon.jvm.options=-Xmx2G -XX:MaxMetaspaceSize=1G
# Kotlin 编译器直接在 Gradle 进程中运行，避免守护进程死锁
kotlin.compiler.execution.strategy=in-process
# 禁用增量编译（增量缓存关闭时会抛出 Storage already registered 异常）
kotlin.incremental=false
